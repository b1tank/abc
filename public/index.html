<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ABC Balloon Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="topbar">
    <div id="topbar-left">
      <button id="startBtn">Start</button>
      <button id="restartBtn" disabled>Restart</button>
    </div>
    <div id="topbar-center">
      <span id="score-display">⭐ 0</span>
    </div>
    <div id="topbar-right">
      <button id="statsToggle" aria-label="Toggle stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
    </div>
  </div>
  <div id="stats-panel" class="collapsed">
    <div id="stats-letters">
      <span class="stats-label">Letters</span>
      <div id="letter-grid"></div>
    </div>
  </div>
  <div id="canvas-container">
    <canvas id="balloonCanvas"></canvas>
  </div>
  <script src="game.js"></script>
</body>

</html>
