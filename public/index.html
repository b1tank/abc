<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ABC Balloon Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="topbar">
    <div id="topbar-left">
      <button id="gameBtn">Start</button>
      <div id="settings-wrap">
        <button id="settingsBtn" aria-label="Settings">⚙</button>
        <div id="settings-dropdown" class="hidden">
          <label><input type="checkbox" id="set-wiggle" checked> Wiggle</label>
          <label><input type="checkbox" id="set-autoStats" checked> Auto-show stats</label>
          <label>Speed
            <select id="set-speed">
              <option value="0.6">Slow</option>
              <option value="1" selected>Normal</option>
              <option value="1.8">Fast</option>
            </select>
          </label>
        </div>
      </div>
    </div>
    <div id="topbar-center">
      <span id="score-display">⭐ 0</span>
      <span id="highscore-display"></span>
    </div>
    <div id="topbar-right">
      <button id="statsToggle" aria-label="Toggle stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
    </div>
  </div>
  <!-- Restart confirmation modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <p id="modal-msg">Restart game? Current stats will be lost.</p>
      <div id="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Restart</button>
      </div>
    </div>
  </div>
  <div id="stats-panel" class="collapsed">
    <div id="stats-letters">
      <div id="letter-grid"></div>
    </div>
  </div>
  <div id="canvas-container">
    <canvas id="balloonCanvas"></canvas>
  </div>
  <script src="game.js"></script>
</body>

</html>
